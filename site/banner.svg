<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">MMDBridge</title>
  <desc id="desc">Schema-driven CSV to MMDB and MMDB to CSV bridge for custom IP intelligence datasets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#153246"/>
      <stop offset="1" stop-color="#0f3f3a"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1280" height="360" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>
  <g transform="translate(92 78)">
    <rect x="0" y="0" width="184" height="204" rx="14" fill="#0b1220" stroke="#68d391" stroke-opacity="0.65"/>
    <text x="28" y="52" fill="#a7f3d0" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">CSV</text>
    <text x="28" y="94" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">cidr,asn,tags</text>
    <text x="28" y="130" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">203.0.113.0/24</text>
    <text x="28" y="160" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">2001:db8::/48</text>
  </g>
  <g transform="translate(343 173)">
    <path d="M0 0H136" stroke="#d1d5db" stroke-width="4" stroke-linecap="round"/>
    <path d="M122 -15L140 0L122 15" fill="none" stroke="#d1d5db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M140 40H4" stroke="#d1d5db" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
    <path d="M18 25L0 40L18 55" fill="none" stroke="#d1d5db" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(545 77)">
    <rect x="0" y="0" width="190" height="206" rx="14" fill="#0b1220" stroke="#93c5fd" stroke-opacity="0.75"/>
    <text x="28" y="52" fill="#bfdbfe" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">Schema</text>
    <text x="28" y="92" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">asn: uint32</text>
    <text x="28" y="123" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">is_vpn: bool</text>
    <text x="28" y="154" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">tags: array</text>
    <text x="28" y="185" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">geo.country.*</text>
  </g>
  <g transform="translate(800 173)">
    <path d="M0 0H136" stroke="#d1d5db" stroke-width="4" stroke-linecap="round"/>
    <path d="M122 -15L140 0L122 15" fill="none" stroke="#d1d5db" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M140 40H4" stroke="#d1d5db" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
    <path d="M18 25L0 40L18 55" fill="none" stroke="#d1d5db" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(1000 78)">
    <rect x="0" y="0" width="184" height="204" rx="14" fill="#0b1220" stroke="#fbbf24" stroke-opacity="0.75"/>
    <text x="28" y="52" fill="#fde68a" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="24">MMDB</text>
    <circle cx="58" cy="110" r="28" fill="#1f2937" stroke="#fbbf24"/>
    <ellipse cx="58" cy="110" rx="16" ry="28" fill="none" stroke="#fbbf24" stroke-opacity="0.8"/>
    <path d="M30 110h56M58 82v56" stroke="#fbbf24" stroke-opacity="0.8"/>
    <text x="28" y="169" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">typed lookup</text>
  </g>
  <text x="92" y="322" fill="#f9fafb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">MMDBridge</text>
  <text x="296" y="322" fill="#d1d5db" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21">typed CSV &lt;-&gt; MMDB for custom IP intelligence datasets</text>
</svg>
